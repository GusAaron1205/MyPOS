<!DOCTYPE html>
<html>
<head>
    <title>Activar Sistema</title>
</head>
<body>
    <h2>Activación requerida</h2>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="POST">
        <input type="text" name="clave" placeholder="Ingresa tu clave" required>
        <button type="submit">Activar</button>
    </form>
</body>
</html>
