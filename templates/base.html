<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Punto de Venta</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSS global -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* Reset y estilo base */
        body {
            font-family: Arial, sans-serif;
            background-color: #1c1c1c;
            color: #fff; /* Todos los textos en blanco */
            margin: 0;
            padding: 0;
        }

        /* Barra de menú completa */
        header {
            background-color: #333;
            width: 100%;
            padding: 10px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        /* Menú centrado y con botones */
        .menu {
            display: flex;
            justify-content: center;
            gap: 15px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .menu li {
            margin: 0;
        }

        .menu li a,
        .menu li button {
            text-decoration: none;
            color: #fff; /* texto blanco */
            background-color: #444;
            padding: 8px 20px;
            border-radius: 6px;
            border: none;
            transition: 0.3s;
            cursor: pointer;
            font-weight: bold;
            text-align: center;
            display: inline-block;
        }

        .menu li a:hover,
        .menu li button:hover {
            background-color: #555;
        }

        main {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px; /* Margen lateral adaptativo */
            color: #fff; /* textos dentro de main también en blanco */
        }

        /* Tablas en escala de grises */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            color: #fff;
        }

        table th,
        table td {
            border: 1px solid #555;
            padding: 10px;
            text-align: center;
        }

        table th {
            background-color: #444;
        }

        table td {
            background-color: #2c2c2c;
        }

        /* Botones dentro de tablas */
        button {
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }

        /* Modal genérico */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #2c2c2c;
            color: #fff;
            padding: 20px;
            border-radius: 10px;
            max-width: 600px;
            width: 90%;
            text-align: center;
        }

    </style>
</head>
<body>
    <!-- Header / Menú -->
    <header>
        <nav>
            <ul class="menu">
                <li><button class="nav-button" onclick="location.href='/ventas'">Ventas</button></li>
                {% if session.get('rol') == 'admin' %}
                <li><button class="nav-button" onclick="location.href='/inventario'">Inventario</button></li>
                <li><button class="nav-button" onclick="location.href='/finanzas'">Finanzas</button></li>
                {% endif %}
                <li><button class="nav-button" onclick="location.href='/historial'">Historial</button></li>
                <!--<li><button class="nav-button" onclick="location.href='/deudas'">Deudas</button></li>
                {% if session.get('usuario_id') %}-->
                <li><button class="nav-button" onclick="location.href='/logout'">Salir ({{ session.get('nombre') }})</button></li>
                {% endif %}
            </ul>
        </nav>
    </header>

    <!-- Contenido de cada página -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Modales globales -->
    <div id="modales">
        {% block modales %}{% endblock %}
    </div>

    <!-- JS global -->
    <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
