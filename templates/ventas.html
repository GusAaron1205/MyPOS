{% extends "base.html" %}

{% block content %}

<h2>Punto de Venta</h2>

<!-- ============================= -->
<!-- BUSQUEDA -->
<!-- ============================= -->

<div class="busqueda-container">
    <input 
        type="text" 
        id="busqueda-productos" 
        placeholder="Buscar producto..."
        autocomplete="off"
    >
    <ul id="sugerencias"></ul>
</div>

<!-- ============================= -->
<!-- PRODUCTOS SELECCIONADOS -->
<!-- ============================= -->

<h3>Productos seleccionados</h3>

<table id="tabla-venta">
    <thead>
        <tr>
            <th>Producto</th>
            <th>Cantidad</th>
            <th>Precio</th>
            <th>Total</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<!-- ============================= -->
<!-- TOTALES -->
<!-- ============================= -->

<div class="totales">

    <p>
        Total a pagar: 
        $<span id="total-pagar">0.00</span>
    </p>

    <p>
        Monto recibido: 
        $<input 
            type="number" 
            id="monto-recibido" 
            placeholder="0.00"
            min="0"
            step="0.01"
        >
    </p>

    <p>
        Cambio: 
        $<span id="cambio">0.00</span>
    </p>

</div>

<button id="finalizar-venta" type="button">
    Finalizar Venta
</button>
<script>
document.getElementById("monto-recibido").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        e.preventDefault(); // evita que recargue la página
        document.getElementById("finalizar-venta").click(); // simula click
    }
});
</script>
<script>
async function verificarActualizacion() {
    try {
        const response = await fetch('/check_update');
        const data = await response.json();

        if(data.update) {
            // Preguntar al usuario
            const confirmacion = confirm(
                `Hay una nueva versión disponible: ${data.latest_version}.\n¿Deseas actualizar ahora?`
            );

            if(confirmacion) {
                // Aquí pones la URL del ZIP de tu GitHub
                const url_zip = 'https://github.com/GusAaron1205/MyPOS/main/update.zip';

                const res = await fetch('/update', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url_zip})
                });

                const resultado = await res.json();
                alert(resultado.message || resultado.error);
                // Si se actualiza, la app se reinicia automáticamente
            }
        }
    } catch(err) {
        console.error('Error al verificar actualización:', err);
    }
}

// Revisar cada 5 minutos
setInterval(verificarActualizacion, 5 * 60 * 1000);

// O revisar al cargar la página
verificarActualizacion();
</script>
{% endblock %}
